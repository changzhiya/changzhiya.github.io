<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <!-- background -->
  <circle cx="54" cy="54" r="52" fill="#1a1a1c"/>
  <circle cx="54" cy="54" r="50" fill="none" stroke="#3a3a3d" stroke-width="1.5"/>

  <!-- body -->
  <ellipse cx="54" cy="78" rx="34" ry="18" fill="#e8d5a3"/>

  <!-- head -->
  <ellipse cx="54" cy="50" rx="28" ry="26" fill="#e8d5a3"/>

  <!-- ears -->
  <polygon points="30,30 22,10 42,26" fill="#e8d5a3" stroke="#d4bc7c" stroke-width="1"/>
  <polygon points="30,28 26,16 40,26" fill="#f0d8d8"/>
  <polygon points="78,30 86,10 66,26" fill="#e8d5a3" stroke="#d4bc7c" stroke-width="1"/>
  <polygon points="78,28 82,16 68,26" fill="#f0d8d8"/>

  <!-- face stripes (tabby) -->
  <path d="M44 36 Q54 32, 64 36" fill="none" stroke="#d4bc7c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="38" x2="44" y2="36" stroke="#d4bc7c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="38" x2="64" y2="36" stroke="#d4bc7c" stroke-width="1.5" stroke-linecap="round"/>

  <!-- eyes -->
  <ellipse cx="42" cy="48" rx="6" ry="7" fill="#1a1a1c"/>
  <ellipse cx="66" cy="48" rx="6" ry="7" fill="#1a1a1c"/>
  <ellipse cx="42" cy="48" rx="5" ry="6" fill="#7ab868"/>
  <ellipse cx="66" cy="48" rx="5" ry="6" fill="#7ab868"/>
  <ellipse cx="42" cy="48" rx="2.5" ry="4" fill="#1a1a1c"/>
  <ellipse cx="66" cy="48" rx="2.5" ry="4" fill="#1a1a1c"/>
  <circle cx="44" cy="45" r="1.5" fill="white"/>
  <circle cx="68" cy="45" r="1.5" fill="white"/>

  <!-- nose -->
  <path d="M52 55 L54 58 L56 55 L54 53 Z" fill="#e89898"/>

  <!-- mouth -->
  <path d="M48 60 Q54 65, 60 60" fill="none" stroke="#c4a080" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="54" y1="58" x2="54" y2="63" stroke="#c4a080" stroke-width="1.5" stroke-linecap="round"/>

  <!-- whiskers -->
  <line x1="20" y1="52" x2="36" y2="55" stroke="#d4bc7c" stroke-width="1" stroke-linecap="round"/>
  <line x1="20" y1="56" x2="35" y2="57" stroke="#d4bc7c" stroke-width="1" stroke-linecap="round"/>
  <line x1="88" y1="52" x2="72" y2="55" stroke="#d4bc7c" stroke-width="1" stroke-linecap="round"/>
  <line x1="88" y1="56" x2="73" y2="57" stroke="#d4bc7c" stroke-width="1" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="34" cy="56" rx="5" ry="3" fill="#f0c0c0" opacity="0.5"/>
  <ellipse cx="74" cy="56" rx="5" ry="3" fill="#f0c0c0" opacity="0.5"/>
</svg>
