<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <!-- background circle -->
  <circle cx="54" cy="54" r="52" fill="#2a2a2a"/>
  <circle cx="54" cy="54" r="50" fill="none" stroke="#4a4a4a" stroke-width="1.5"/>

  <!-- face -->
  <ellipse cx="54" cy="56" rx="30" ry="32" fill="#e4c882"/>

  <!-- hair -->
  <ellipse cx="54" cy="34" rx="32" ry="16" fill="#3a3028"/>
  <ellipse cx="54" cy="28" rx="30" ry="18" fill="#3a3028"/>
  <ellipse cx="30" cy="44" rx="6" ry="14" fill="#3a3028"/>
  <ellipse cx="78" cy="44" rx="6" ry="14" fill="#3a3028"/>

  <!-- eyes -->
  <ellipse cx="44" cy="52" rx="5" ry="6" fill="#2a2a2a"/>
  <ellipse cx="64" cy="52" rx="5" ry="6" fill="#2a2a2a"/>
  <circle cx="46" cy="50" r="2" fill="white"/>
  <circle cx="66" cy="50" r="2" fill="white"/>

  <!-- eyebrows -->
  <path d="M37 45 Q44 42, 50 45" fill="none" stroke="#3a3028" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M71 45 Q64 42, 58 45" fill="none" stroke="#3a3028" stroke-width="2.5" stroke-linecap="round"/>

  <!-- nose -->
  <path d="M54 52 Q52 58, 50 60 Q54 62, 56 60" fill="none" stroke="#c4a060" stroke-width="1.5" stroke-linecap="round"/>

  <!-- mouth -->
  <path d="M46 68 Q54 74, 62 68" fill="none" stroke="#c47860" stroke-width="2" stroke-linecap="round"/>

  <!-- glasses -->
  <rect x="37" y="47" width="14" height="10" rx="3" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="57" y="47" width="14" height="10" rx="3" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="51" y1="52" x2="57" y2="52" stroke="#2a2a2a" stroke-width="2"/>
</svg>
